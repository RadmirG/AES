services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama-server:11434
      # Expose AES as an OpenAI-compatible provider in Open WebUI.
      # Inside Docker, use the LangGraph service name and container port.
      - ENABLE_OPENAI_API=True
      - OPENAI_API_BASE_URL=http://langgraph:8001/v1
      - OPENAI_API_KEY=aes-dev-no-auth
      - DEFAULT_MODELS=aes-agent
    volumes:
      - ./data:/app/backend/data
    networks:
      - ai-stack-net

networks:
  ai-stack-net:
    external: true
