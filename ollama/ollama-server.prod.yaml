services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:11435:11434"
    volumes:
      - ./data:/root/.ollama
    environment:
      - OLLAMA_CONTEXT_LENGTH=8192
      - OLLAMA_KEEP_ALIVE=60m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_LOAD_TIMEOUT=15m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    networks:
      - ai-stack-net

  ollama-model-puller:
    image: python:3.12-slim
    profiles:
      - models
    depends_on:
      - ollama
    working_dir: /workspace
    volumes:
      - ./:/workspace/ollama:ro
    environment:
      - OLLAMA_URL=http://ollama:11434
    command:
      - python
      - ollama/pull_models.py
      - --file
      - ollama/models.prod.yaml
      - --group
      - "${AES_OLLAMA_PULL_GROUP:-runtime}"
      - --include-default
      - --model
      - "${AES_OLLAMA_MODEL:-gemma4:26b}"
    networks:
      - ai-stack-net

networks:
  ai-stack-net:
    external: true

