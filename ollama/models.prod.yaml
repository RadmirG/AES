# Ollama models for the AES production/server setup.
#
# Target runtime:
# - GPU-backed Ollama service from ollama-server.prod.yaml
# - Docker Compose reserves NVIDIA GPU device_ids: ["1"]
# - Default production context in compose: OLLAMA_CONTEXT_LENGTH=8192
#
# This profile assumes materially stronger hardware than the laptop dev setup.
# Keep the production pull set deliberately narrow: one default runtime model,
# one smaller fallback, and one larger quality comparison model.
production_profile:
  name: gpu_server_prod
  runtime: ollama
  compose_file: ollama-server.prod.yaml
  gpu_required: true
  gpu_device_ids:
    - "1"
  runtime_notes:
    - Use this manifest for production/server pulls, not for laptop iteration.
    - Keep OLLAMA_CONTEXT_LENGTH=8192 until latency and memory behavior are measured.
    - Use gemma4:26b as the default AES production model.
    - Pull only qwen3:8b, gemma4:26b, and gemma4:31b by default.
    - Use OLLAMA_NUM_PARALLEL=1 and OLLAMA_MAX_LOADED_MODELS=1 to avoid VRAM splitting.
    - Increase the model set only after measured latency and memory checks.

defaults:
  aes_ollama_model: gemma4:26b
  production_reasoning_model: gemma4:26b
  production_coding_model: qwen3:8b
  production_agent_model: gemma4:26b
  fallback_model: qwen3:8b
  high_capacity_reasoning_model: gemma4:31b

pull_groups:
  runtime:
    description: Complete AES production model set.
    models:
      - qwen3:8b
      - gemma4:26b
      - gemma4:31b

  baseline:
    description: Alias for the complete AES production model set.
    models:
      - qwen3:8b
      - gemma4:26b
      - gemma4:31b

  high_capacity:
    description: Alias kept for existing commands; no additional models are pulled.
    models:
      - qwen3:8b
      - gemma4:26b
      - gemma4:31b

runtime:
  recommended_ollama_num_ctx: 8192
  max_planned_ollama_num_ctx: 32768
  recommended_env:
    AES_OLLAMA_MODEL: gemma4:26b
    OLLAMA_CONTEXT_LENGTH: "8192"
    OLLAMA_KEEP_ALIVE: 60m
    OLLAMA_NUM_PARALLEL: "1"
    OLLAMA_MAX_LOADED_MODELS: "1"

automation:
  puller_script: pull_models.py
  compose_profile: models
  default_pull_group: runtime
  pulls_runtime_model: true
  runtime_selector_env: AES_OLLAMA_MODEL
  runtime_selector_default: gemma4:26b
  pull_group_env: AES_OLLAMA_PULL_GROUP

models:
  default: gemma4:26b
  runtime:
    - qwen3:8b
    - gemma4:26b
    - gemma4:31b


