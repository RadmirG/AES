# Ollama models for the local AES development setup.
#
# Target laptop:
# - CPU: Intel Core i7-7820HQ @ 2.90GHz
# - GPU: Intel HD Graphics 630 + NVIDIA Quadro M2200
# - RAM: 64 GB
#
# Keep the dev setup intentionally small. The pull automation should install
# only the runtime model needed to test the AES graph, API, and MCP routing.
hardware_profile:
  name: laptop_i7_7820hq_64gb_quadro_m2200
  cpu: Intel Core i7-7820HQ @ 2.90GHz
  gpu:
    - Intel HD Graphics 630
    - NVIDIA Quadro M2200
  ram_gb: 64
  storage:
    - CT2000P3PSSD8
    - SAMSUNG MZVLB1T0HALR-000L7
  runtime_notes:
    - Prefer one CPU-friendly model for normal graph development.
    - Use a 4096-token context for graph development and local tests.
    - Avoid pulling optional models into the default dev environment.
    - Use stronger models only through the production manifest.

defaults:
  aes_ollama_model: qwen3:4b
  fast_smoke_model: qwen3:4b
  coding_model: qwen3:4b
  reasoning_model: qwen3:4b
  general_model: qwen3:4b

pull_groups:
  runtime:
    description: Single local AES development model.
    models:
      - qwen3:4b

  minimal:
    description: Alias for the single local AES development model.
    models:
      - qwen3:4b

  recommended:
    description: Alias kept for existing commands; still pulls only the dev runtime model.
    models:
      - qwen3:4b

runtime:
  recommended_ollama_num_ctx: 4096
  max_laptop_ollama_num_ctx: 8192
  recommended_env:
    AES_OLLAMA_MODEL: qwen3:4b
    OLLAMA_CONTEXT_LENGTH: "4096"
    OLLAMA_KEEP_ALIVE: 60m
    OLLAMA_NUM_PARALLEL: "1"
    OLLAMA_MAX_LOADED_MODELS: "1"

automation:
  puller_script: pull_models.py
  compose_profile: models
  default_pull_group: runtime
  pulls_runtime_model: true
  runtime_selector_env: AES_OLLAMA_MODEL
  runtime_selector_default: qwen3:4b
  pull_group_env: AES_OLLAMA_PULL_GROUP

models:
  default: qwen3:4b
  runtime:
    - qwen3:4b


