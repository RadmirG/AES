services:
  langgraph:
    build: .
    container_name: langgraph
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8001"
    environment:
      - OLLAMA_BASE_URL=http://ollama-server:11434
      - OLLAMA_MODEL=gemma4:31b
      - OLLAMA_TIMEOUT=180
      - OLLAMA_NUM_CTX=4096
    networks:
      - ai-stack-net

networks:
  ai-stack-net:
    external: true