services:
  langgraph:
    build: .
    container_name: langgraph
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8001"
    depends_on:
      aes-postgres:
        condition: service_healthy
      aes-database-migrate:
        condition: service_completed_successfully
    environment:
      - OLLAMA_BASE_URL=http://ollama-server:11434
#      - OLLAMA_MODEL=gemma4:31b
      - OLLAMA_MODEL=${AES_OLLAMA_MODEL:-qwen3:4b}
      - OLLAMA_TIMEOUT=300
      - OLLAMA_NUM_CTX=4096
      # Optional live FEniCS/DOLFINx MCP execution.
      # Leave DOLFINX_MCP_EXECUTE=false to return a planned MCP workflow only.
      - DOLFINX_MCP_URL=http://dolfinx-mcp:8000/mcp
      - DOLFINX_MCP_EXECUTE=${DOLFINX_MCP_EXECUTE:-false}
      - DOLFINX_MCP_TIMEOUT=120
      # Keep generated-code execution disabled in dev unless explicitly
      # enabled for a sandbox/script-runner smoke test.
      - DOLFINX_CODE_MCP_URL=http://fenics-code-runner:8000/mcp
      - DOLFINX_CODE_EXECUTE=${DOLFINX_CODE_EXECUTE:-false}
      - DOLFINX_CODE_TIMEOUT=${DOLFINX_CODE_TIMEOUT:-300}
      - DOLFINX_CODE_REPAIR_ATTEMPTS=${DOLFINX_CODE_REPAIR_ATTEMPTS:-2}
      - AES_LOG_LEVEL=${AES_LOG_LEVEL:-INFO}
      - AES_LOG_CONTENT=${AES_LOG_CONTENT:-true}
      - AES_LOG_MAX_CHARS=${AES_LOG_MAX_CHARS:-2000}
      - AES_ARTIFACT_ROOT=/artifacts
      - AES_PUBLIC_BASE_URL=${AES_PUBLIC_BASE_URL:-http://127.0.0.1:3000}
      - AES_CORS_ORIGINS=${AES_CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      - AES_AUTH_ENABLED=${AES_AUTH_ENABLED:-true}
      - AES_AUTH_COOKIE_NAME=${AES_AUTH_COOKIE_NAME:-aes_session}
      - AES_AUTH_COOKIE_SECURE=${AES_AUTH_COOKIE_SECURE:-false}
      - AES_AUTH_COOKIE_SAMESITE=${AES_AUTH_COOKIE_SAMESITE:-lax}
      - AES_AUTH_SESSION_TTL_SECONDS=${AES_AUTH_SESSION_TTL_SECONDS:-43200}
      - AES_AUTH_LOGIN_MAX_ATTEMPTS=${AES_AUTH_LOGIN_MAX_ATTEMPTS:-5}
      - AES_AUTH_LOGIN_WINDOW_SECONDS=${AES_AUTH_LOGIN_WINDOW_SECONDS:-300}
      - AES_DB_HOST=aes-postgres
      - AES_DB_PORT=5432
      - AES_DB_NAME=${AES_POSTGRES_DB:-aes}
      - AES_DB_USER=aes_app
      - AES_DB_PASSWORD=${AES_POSTGRES_APP_PASSWORD:?Set AES_POSTGRES_APP_PASSWORD in the repository-root .env file}
    volumes:
      - ../artifacts:/artifacts
    networks:
      - ai-stack-net

networks:
  ai-stack-net:
    external: true
