services:
  web-ui:
    build: .
    image: aes-web-ui:latest
    container_name: web-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    depends_on:
      langgraph:
        condition: service_started
    networks:
      - ai-stack-net

networks:
  ai-stack-net:
    external: true
