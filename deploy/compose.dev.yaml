name: aes-dev

services:
  langgraph:
    build:
      context: ../langgraph
    container_name: langgraph
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8001"
    environment:
      - OLLAMA_BASE_URL=http://ollama-server:11434
      - OLLAMA_MODEL=gemma4:e4b
      - OLLAMA_TIMEOUT=300
      - OLLAMA_NUM_CTX=4096
      - DOLFINX_MCP_URL=http://dolfinx-mcp:8000/mcp
      - DOLFINX_MCP_EXECUTE=false
      - DOLFINX_MCP_TIMEOUT=120
    networks:
      - ai-stack-net

networks:
  ai-stack-net:
    external: true

