name: aes-full

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:11435:11434"
    volumes:
      - ../ollama/data:/root/.ollama
    environment:
      - OLLAMA_CONTEXT_LENGTH=8192
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    networks:
      - ai-stack-net

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama-server:11434
    volumes:
      - ../open-webui/data:/app/backend/data
    depends_on:
      - ollama
    networks:
      - ai-stack-net

  dolfinx-mcp:
    image: dolfinx-mcp:latest
    container_name: dolfinx-mcp
    restart: unless-stopped
    profiles:
      - fenics
    ports:
      - "127.0.0.1:8003:8000"
    volumes:
      - ../mcp/providers/fenics/workspace:/workspace
    command:
      - "--transport"
      - "streamable-http"
      - "--host"
      - "0.0.0.0"
    networks:
      - ai-stack-net

  langgraph:
    build:
      context: ../langgraph
    container_name: langgraph
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8001"
    environment:
      - OLLAMA_BASE_URL=http://ollama-server:11434
      - OLLAMA_MODEL=gemma4:e4b
      - OLLAMA_TIMEOUT=300
      - OLLAMA_NUM_CTX=4096
      - DOLFINX_MCP_URL=http://dolfinx-mcp:8000/mcp
      - DOLFINX_MCP_EXECUTE=false
      - DOLFINX_MCP_TIMEOUT=120
    depends_on:
      - ollama
    networks:
      - ai-stack-net

networks:
  ai-stack-net:
    external: true

