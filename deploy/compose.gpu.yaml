name: aes-gpu

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:11435:11434"
    volumes:
      - ../ollama/data:/root/.ollama
    environment:
      - OLLAMA_CONTEXT_LENGTH=8192
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    networks:
      - ai-stack-net

networks:
  ai-stack-net:
    external: true

